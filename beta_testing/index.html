    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Testing - VidGenerator</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --accent: #ff6b9d;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.95);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-glow: rgba(0, 255, 136, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 2px solid var(--border-glow);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .beta-tests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .beta-test-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--border-glow);
            transition: all 0.3s;
        }

        .beta-test-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
            border-color: var(--primary);
        }

        .test-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .test-status.active {
            background: var(--primary);
            color: #000;
        }

        .test-status.completed {
            background: #666;
            color: #fff;
        }

        .test-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .test-description {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .test-features {
            margin-bottom: 20px;
        }

        .test-features h3 {
            font-size: 1.1em;
            margin-bottom: 10px;
            color: var(--secondary);
        }

        .test-features ul {
            list-style: none;
            padding-left: 0;
        }

        .test-features li {
            padding: 5px 0;
            color: var(--text-secondary);
        }

        .test-features li:before {
            content: "✓ ";
            color: var(--primary);
            font-weight: bold;
        }

        .test-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(0, 255, 136, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .test-button {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .test-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.5);
        }

        .create-test-section {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--border-glow);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-glow);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1em;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
    </style>

</head>
<body>
    <div class="header">
        <h1>🧪 Beta Testing</h1>
        <p>Test new features and provide feedback</p>
    </div>

    <div class="create-test-section">
        <h2 style="margin-bottom: 20px; color: var(--primary);">Create New Beta Test</h2>
        <form id="create-test-form">
            <div class="form-group">
                <label>Test Name</label>
                <input type="text" id="test-name" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="test-description" required></textarea>
            </div>
            <div class="form-group">
                <label>Features (comma-separated)</label>
                <input type="text" id="test-features" placeholder="Feature 1, Feature 2, Feature 3" required>
            </div>
            <div class="form-group">
                <label>Duration (days)</label>
                <input type="number" id="test-duration" value="30" min="1" required>
            </div>
            <div class="form-group">
                <label>Max Testers</label>
                <input type="number" id="test-max-testers" value="100" min="1" required>
            </div>
            <button type="submit" class="test-button">Create Beta Test</button>
        </form>
    </div>

    <div id="beta-tests-container">
        <h2 style="margin-bottom: 20px; color: var(--primary);">Active Beta Tests</h2>
        <div class="beta-tests-grid" id="beta-tests-grid">
            <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                Loading beta tests...
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // Load beta tests
        async function loadBetaTests() {
            try {
                const response = await fetch(`${BASE_URL}/api/beta-testing/tests`);
                const data = await response.json();
                
                if (data.success && data.beta_tests) {
                    renderBetaTests(data.beta_tests);
                } else {
                    document.getElementById('beta-tests-grid').innerHTML = 
                        '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">No beta tests available</div>';
                }
            } catch (error) {
                console.error('Error loading beta tests:', error);
            }
        }

        function renderBetaTests(tests) {
            const grid = document.getElementById('beta-tests-grid');
            grid.innerHTML = '';
            
            tests.forEach(test => {
                const card = document.createElement('div');
                card.className = 'beta-test-card';
                
                const statusClass = test.status === 'active' ? 'active' : 'completed';
                const endDate = new Date(test.end_date).toLocaleDateString();
                
                card.innerHTML = `
                    <span class="test-status ${statusClass}">${test.status.toUpperCase()}</span>
                    <h3 class="test-title">${test.test_name}</h3>
                    <p class="test-description">${test.description}</p>
                    <div class="test-features">
                        <h3>Features to Test:</h3>
                        <ul>
                            ${test.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="test-stats">
                        <div class="stat-item">
                            <div class="stat-value">${test.current_testers}</div>
                            <div class="stat-label">Testers</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${test.statistics.feedback_count}</div>
                            <div class="stat-label">Feedback</div>
                        </div>
                    </div>
                    <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 15px;">
                        Ends: ${endDate}
                    </p>
                    <button class="test-button" onclick="registerForTest('${test.test_id}')">
                        Join Beta Test
                    </button>
                `;
                
                grid.appendChild(card);
            });
        }

        // Create test form
        document.getElementById('create-test-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const testData = {
                test_name: document.getElementById('test-name').value,
                description: document.getElementById('test-description').value,
                features: document.getElementById('test-features').value.split(',').map(f => f.trim()),
                duration_days: parseInt(document.getElementById('test-duration').value),
                max_testers: parseInt(document.getElementById('test-max-testers').value)
            };
            
            try {
                const response = await fetch(`${BASE_URL}/api/beta-testing/create`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Beta test created successfully!');
                    document.getElementById('create-test-form').reset();
                    loadBetaTests();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error creating beta test: ' + error);
            }
        });

        async function registerForTest(testId) {
            try {
                const response = await fetch(`${BASE_URL}/api/beta-testing/register/${testId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Successfully registered for beta test!');
                    loadBetaTests();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error registering: ' + error);
            }
        }

        // Initialize
        loadBetaTests();
        setInterval(loadBetaTests, 60000); // Refresh every minute
    </script>

    <script>
        // Force reload main content on page load if cache version is old
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || '0';
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            
            if (storedVersion && storedVersion !== currentVersion) {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                if (window.location.search.indexOf('v=') === -1) {
                    window.location.reload();
                    return;
                }
            } else if (!storedVersion) {
                // First visit - store version
                sessionStorage.setItem('pageCacheVersion', currentVersion);
            }
            
            // Add cache-busting to all internal links
            document.addEventListener('DOMContentLoaded', function() {
                const links = document.querySelectorAll('a[href^="/"]');
                links.forEach(link => {
                    if (!link.href.includes('?')) {
                        link.href += '?v=' + currentVersion;
                    }
                });
            });
        })();
    </script>

    <script>
        // Simple cache version check (no aggressive reloading)
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || document.querySelector('meta[name="version"]')?.content || '0';
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            
            // Only reload if version actually changed (not on every load)
            if (storedVersion && storedVersion !== currentVersion && storedVersion !== '0') {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                // Only reload once if version changed
                if (window.location.search.indexOf('v=') === -1) {
                    window.location.reload();
                    return;
                }
            }
            
            // Store version only once
            if (!storedVersion) {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
            }
        })();
    </script>

    <!-- Hypnotic Point Counters -->
    <script src="/static/js/hypnotic-point-counters.js"></script>
</body>
