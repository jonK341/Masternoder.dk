<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="MasterNoder2 Casino">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1035"/>
      <stop offset="55%" stop-color="#120820"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="45%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#33FFAA"/>
      <stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="glowGold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <radialGradient id="spotLeft" cx="15%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spotRight" cx="88%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#spotLeft)"/>
  <rect width="1200" height="630" fill="url(#spotRight)"/>

  <!-- Decorative arc (crash curve) -->
  <path d="M 80 520 Q 320 120 620 200 T 1120 380" fill="none" stroke="#00FF88" stroke-width="3" opacity="0.35" filter="url(#glowCyan)"/>
  <circle cx="620" cy="200" r="8" fill="#00FF88" filter="url(#glowCyan)"/>

  <!-- Rocket (crash motif) -->
  <g transform="translate(920 140) rotate(-28)" filter="url(#glowCyan)">
    <path d="M 0 -48 L 22 28 L 0 18 L -22 28 Z" fill="url(#rocketBody)"/>
    <path d="M -14 22 L 0 42 L 14 22 Z" fill="#FF3366" opacity="0.9"/>
    <ellipse cx="0" cy="-8" rx="10" ry="14" fill="#00D4FF" opacity="0.85"/>
    <path d="M -8 30 Q 0 52 8 30" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Dice -->
  <g transform="translate(110 420) rotate(-12)">
    <rect x="0" y="0" width="72" height="72" rx="12" fill="#1e1e2e" stroke="#FFD700" stroke-width="2.5" filter="url(#glowGold)"/>
    <circle cx="22" cy="22" r="6" fill="#FFD700"/>
    <circle cx="50" cy="50" r="6" fill="#FFD700"/>
    <circle cx="36" cy="36" r="6" fill="#FFD700"/>
  </g>
  <g transform="translate(180 360) rotate(18)">
    <rect x="0" y="0" width="56" height="56" rx="10" fill="#1e1e2e" stroke="#00D4FF" stroke-width="2" filter="url(#glowCyan)"/>
    <circle cx="28" cy="28" r="7" fill="#00D4FF"/>
  </g>

  <!-- Slot machine -->
  <g transform="translate(980 400)">
    <rect x="0" y="0" width="130" height="150" rx="14" fill="#252535" stroke="#FFD700" stroke-width="2.5" filter="url(#glowGold)"/>
    <rect x="12" y="18" width="106" height="70" rx="8" fill="#0A0E14" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="65" y="58" text-anchor="middle" font-size="28" fill="#FF3366">7</text>
    <text x="65" y="88" text-anchor="middle" font-size="22" fill="#FFD700"></text>
    <rect x="28" y="108" width="74" height="22" rx="6" fill="url(#neonGreen)"/>
    <text x="65" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#07150d">JACKPOT</text>
  </g>

  <!-- Plinko balls -->
  <circle cx="240" cy="180" r="14" fill="#FFD700" filter="url(#glowGold)" opacity="0.9"/>
  <circle cx="270" cy="210" r="10" fill="#00D4FF" filter="url(#glowCyan)" opacity="0.85"/>
  <circle cx="300" cy="240" r="12" fill="#FF00FF" opacity="0.75"/>
  <g opacity="0.5">
    <circle cx="255" cy="250" r="3" fill="#94A3B8"/>
    <circle cx="285" cy="270" r="3" fill="#94A3B8"/>
    <circle cx="315" cy="290" r="3" fill="#94A3B8"/>
    <circle cx="240" cy="290" r="3" fill="#94A3B8"/>
    <circle cx="270" cy="310" r="3" fill="#94A3B8"/>
  </g>

  <!-- Chip stack -->
  <g transform="translate(820 460)">
    <ellipse cx="0" cy="0" rx="38" ry="12" fill="#2563EB" stroke="#00D4FF" stroke-width="2"/>
    <ellipse cx="0" cy="-14" rx="38" ry="12" fill="#7C3AED" stroke="#C4B5FD" stroke-width="2"/>
    <ellipse cx="0" cy="-28" rx="38" ry="12" fill="#1e1e2e" stroke="#FFD700" stroke-width="2"/>
    <text x="0" y="-22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FFD700">MN2</text>
  </g>

  <!-- Main title block -->
  <text x="600" y="268" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="72" font-weight="800" fill="url(#titleGrad)" filter="url(#glowGold)">MasterNoder2 Casino</text>
  <text x="600" y="328" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="28" font-weight="600" fill="#C4B5FD">Ride the rocket · Hit the jackpot · Own the lounge</text>
  <text x="600" y="378" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="20" fill="#94A3B8">Crash · Slots · Plinko · Mines · Tournaments · masternoder.dk</text>

  <!-- Bottom accent bar -->
  <rect x="200" y="560" width="800" height="4" rx="2" fill="url(#titleGrad)" opacity="0.85"/>
  <text x="600" y="598" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#64748B" letter-spacing="0.12em">VIRTUAL COINS · MN2 · SOCIAL LOUNGE</text>
</svg>
