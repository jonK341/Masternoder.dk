<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center — MasterNoder</title>
    <link rel="stylesheet" href="/static/css/modern-design-system.css">
    <link rel="stylesheet" href="/static/css/navigation-toolbar.css">
    <style>
        .cc-page { max-width: 1200px; margin: 0 auto; padding: 24px 16px 64px; }
        .cc-header { text-align: center; margin-bottom: 24px; }
        .cc-header h1 { font-size: 2rem; margin: 0; background: linear-gradient(135deg,#00d4ff,#00ff88); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .cc-hub-nav { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:16px 0 24px; }
        .cc-tab { padding:8px 14px; border-radius:8px; border:1px solid rgba(0,212,255,0.35); background:rgba(0,0,0,0.25); color:#fff; cursor:pointer; }
        .cc-tab.active { border-color:#00ff88; background:rgba(0,255,136,0.15); color:#00ff88; }
        .cc-panel { display:none; }
        .cc-panel.active { display:block; }
        .cc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
        .cc-card { border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:16px; background:rgba(0,0,0,0.28); }
        .cc-card h3 { margin:0 0 8px; font-size:1rem; color:#00d4ff; }
        .cc-reward { font-size:0.82rem; color:#00ff88; margin-top:8px; }
        .cc-monitor { border:1px solid rgba(0,255,136,0.25); border-radius:12px; padding:14px; margin-bottom:16px; background:rgba(0,255,136,0.06); }
        .cc-monitor-bar { height:8px; background:rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; margin-top:8px; }
        .cc-monitor-fill { height:100%; width:0; background:linear-gradient(90deg,#00ff88,#00d4ff); transition:width 0.4s; }
        #cc-agent-status { font-size:0.85rem; opacity:0.85; min-height:1.2em; }
    </style>
</head>
<body>
    <div class="cc-page">
        <div class="cc-header">
            <h1>Command Center</h1>
            <p style="opacity:0.75;">Battle · Trophies · Game · Quests · Battlegrounds · Social — one hub with MN2 rewards</p>
        </div>
        <nav class="cc-hub-nav" id="cc-hub-nav" role="tablist">
            <button type="button" class="cc-tab active" data-cc-tab="overview">Overview</button>
            <button type="button" class="cc-tab" data-cc-tab="battle">Battle</button>
            <button type="button" class="cc-tab" data-cc-tab="trophies">Trophies</button>
            <button type="button" class="cc-tab" data-cc-tab="game">Game</button>
            <button type="button" class="cc-tab" data-cc-tab="quests">Quests</button>
            <button type="button" class="cc-tab" data-cc-tab="battlegrounds">Battlegrounds</button>
            <button type="button" class="cc-tab" data-cc-tab="social">Social</button>
            <button type="button" class="cc-tab" data-cc-tab="generator">Generator</button>
            <button type="button" class="cc-tab" data-cc-tab="agents">Agents</button>
        </nav>
        <div class="cc-monitor" id="cc-power-monitor">
            <strong>Power monitor</strong> — battles, generator output, earnings
            <div class="cc-monitor-bar"><div class="cc-monitor-fill" id="cc-power-fill"></div></div>
            <div id="cc-power-label" style="font-size:0.8rem;margin-top:6px;opacity:0.8;">Loading…</div>
        </div>
        <div id="cc-panel-overview" class="cc-panel active">
            <div class="cc-grid" id="cc-overview-grid"></div>
        </div>
        <div id="cc-panel-battle" class="cc-panel"><div class="cc-grid" id="cc-battle-grid"></div></div>
        <div id="cc-panel-trophies" class="cc-panel"><div class="cc-grid" id="cc-trophies-grid"></div></div>
        <div id="cc-panel-game" class="cc-panel"><div class="cc-grid" id="cc-game-grid"></div></div>
        <div id="cc-panel-quests" class="cc-panel"><div class="cc-grid" id="cc-quests-grid"></div></div>
        <div id="cc-panel-battlegrounds" class="cc-panel"><div class="cc-grid" id="cc-bg-grid"></div></div>
        <div id="cc-panel-social" class="cc-panel"><div class="cc-grid" id="cc-social-grid"></div></div>
        <div id="cc-panel-generator" class="cc-panel"><div class="cc-grid" id="cc-gen-grid"></div></div>
        <div id="cc-panel-agents" class="cc-panel">
            <p id="cc-agent-status">Agent support loading…</p>
            <div class="cc-grid" id="cc-agents-grid"></div>
        </div>
    </div>
    <script src="/static/js/navigation-toolbar.js?v=20260618a"></script>
    <script src="/static/js/command-center-hub.js?v=20260618a"></script>
</body>
</html>
