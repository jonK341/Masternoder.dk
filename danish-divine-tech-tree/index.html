<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dansk Giga Guddommelig Tech Træ - MasterNoder</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Dansk Giga Guddommelig Baggrund */
        .dansk-giga-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(200, 0, 0, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 10% 80%, rgba(0, 100, 200, 0.25) 0%, transparent 40%),
                linear-gradient(135deg, #000000 0%, #1a0a0a 25%, #0a0a1a 50%, #1a1a0a 75%, #000000 100%);
            background-size: 400% 400%;
            animation: danskGigaShift 30s ease infinite;
        }

        @keyframes danskGigaShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
        }

        /* Dansk Flag Partikler */
        .dansk-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .dansk-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #C8102E;
            border-radius: 50%;
            animation: danskFloat 20s infinite;
            box-shadow: 0 0 15px rgba(200, 16, 46, 0.8);
        }

        .dansk-particle.white {
            background: #FFFFFF;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        @keyframes danskFloat {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(150px) scale(1);
                opacity: 0;
            }
        }

        /* Hoved Container */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header med Dansk Flag */
        .header {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid #C8102E;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(200, 16, 46, 0.4);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.1) 48%, 
                rgba(255, 255, 255, 0.1) 52%, 
                transparent 100%);
            pointer-events: none;
        }

        .header h1 {
            font-size: 2.8em;
            background: linear-gradient(135deg, #C8102E, #FFFFFF, #C8102E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(200, 16, 46, 0.6);
            animation: danskGlow 4s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes danskGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.8); }
        }

        .header-controls {
            display: flex;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .btn {
            padding: 12px 24px;
            background: rgba(200, 16, 46, 0.3);
            border: 2px solid rgba(200, 16, 46, 0.6);
            color: #FFFFFF;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .btn:hover {
            background: rgba(200, 16, 46, 0.5);
            box-shadow: 0 0 25px rgba(200, 16, 46, 0.8);
            transform: translateY(-2px);
        }

        /* Tech Træ Container */
        .tech-tree-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            padding: 50px;
        }

        .tech-tree {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 2500px;
            min-width: 3500px;
        }

        /* Node Stilarter */
        .node {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s;
            border: 4px solid;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .node::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
            filter: blur(20px);
            opacity: 0.7;
            z-index: -1;
        }

        .node:hover {
            transform: scale(1.3);
            z-index: 200;
        }

        .node.active {
            animation: danskPulse 2.5s infinite;
        }

        @keyframes danskPulse {
            0%, 100% {
                box-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            }
            50% {
                box-shadow: 0 0 60px currentColor, 0 0 120px currentColor;
            }
        }

        /* Node Typer - Dansk Farver */
        .node-core {
            border-color: #C8102E;
            color: #C8102E;
            background: rgba(200, 16, 46, 0.15);
        }

        .node-stats {
            border-color: #FFFFFF;
            color: #FFFFFF;
            background: rgba(255, 255, 255, 0.15);
        }

        .node-economic {
            border-color: #FFD700;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.15);
        }

        .node-achievement {
            border-color: #00FF88;
            color: #00FF88;
            background: rgba(0, 255, 136, 0.15);
        }

        .node-battle {
            border-color: #FF4444;
            color: #FF4444;
            background: rgba(255, 68, 68, 0.15);
        }

        .node-metal {
            border-color: #9d4edd;
            color: #9d4edd;
            background: rgba(157, 78, 221, 0.15);
        }

        .node-social {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
        }

        .node-resource {
            border-color: #ff64ff;
            color: #ff64ff;
            background: rgba(255, 100, 255, 0.15);
        }

        .node-activity {
            border-color: #ffaa00;
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.15);
        }

        .node-divine {
            border-color: #C8102E;
            color: #FFFFFF;
            background: linear-gradient(135deg, rgba(200, 16, 46, 0.3), rgba(255, 255, 255, 0.3));
            animation: divineGlow 3s infinite;
        }

        @keyframes divineGlow {
            0%, 100% {
                box-shadow: 0 0 40px rgba(200, 16, 46, 0.8), 0 0 80px rgba(255, 255, 255, 0.6);
            }
            50% {
                box-shadow: 0 0 80px rgba(200, 16, 46, 1), 0 0 160px rgba(255, 255, 255, 0.8);
            }
        }

        /* Forbindelseslinjer */
        .connection {
            position: absolute;
            height: 3px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            opacity: 0.4;
            z-index: 50;
            transform-origin: left center;
        }

        .connection.active {
            opacity: 0.9;
            animation: danskFlow 3s infinite;
        }

        @keyframes danskFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* Node Indhold */
        .node-icon {
            font-size: 2.2em;
            z-index: 10;
        }

        .node-label {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 0.75em;
            font-weight: bold;
            text-shadow: 0 0 15px currentColor;
            opacity: 0;
            transition: opacity 0.3s;
            color: #FFFFFF;
        }

        .node:hover .node-label {
            opacity: 1;
        }

        .node-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node:hover .node-value {
            opacity: 1;
        }

        /* Info Panel */
        .info-panel {
            position: fixed;
            right: -450px;
            top: 100px;
            width: 420px;
            height: calc(100vh - 120px);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            border-left: 4px solid #C8102E;
            padding: 35px;
            overflow-y: auto;
            transition: right 0.5s ease;
            z-index: 1000;
            box-shadow: -15px 0 40px rgba(0, 0, 0, 0.9);
        }

        .info-panel.open {
            right: 0;
        }

        .info-panel h2 {
            color: #C8102E;
            margin-bottom: 25px;
            font-size: 2em;
            border-bottom: 3px solid rgba(200, 16, 46, 0.4);
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        .info-section {
            margin-bottom: 30px;
        }

        .info-section h3 {
            color: #FFFFFF;
            margin-bottom: 12px;
            font-size: 1.3em;
            text-transform: uppercase;
        }

        .info-item {
            padding: 12px;
            margin: 10px 0;
            background: rgba(200, 16, 46, 0.1);
            border-left: 4px solid rgba(200, 16, 46, 0.5);
            border-radius: 6px;
        }

        .info-item strong {
            color: #C8102E;
        }

        /* Stats Panel */
        .stats-panel {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(200, 16, 46, 0.4);
            border-radius: 15px;
            padding: 25px;
            min-width: 350px;
            z-index: 1000;
            box-shadow: 0 0 40px rgba(200, 16, 46, 0.4);
        }

        .stats-panel h3 {
            color: #C8102E;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-transform: uppercase;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: #aaa;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .stat-value {
            color: #FFD700;
            font-weight: bold;
            font-size: 1.1em;
        }

        /* Zoom Kontroller */
        .zoom-controls {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .zoom-btn {
            width: 55px;
            height: 55px;
            background: rgba(200, 16, 46, 0.3);
            border: 3px solid rgba(200, 16, 46, 0.6);
            color: #FFFFFF;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .zoom-btn:hover {
            background: rgba(200, 16, 46, 0.5);
            transform: scale(1.15);
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            text-align: center;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(200, 16, 46, 0.3);
            border-top-color: #C8102E;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(200, 16, 46, 0.6);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 16, 46, 0.9);
        }
    </style>

    <link rel="stylesheet" href="/static/css/template-effects.css">

<body>
    <div class="dansk-giga-bg"></div>
    <div class="dansk-particles" id="danskParticles"></div>

    <div class="main-container">
        <div class="header">
            <h1><i class="fas fa-flag"></i> Dansk Giga Guddommelig Tech Træ</h1>
            <div class="header-controls">
                <a href="/" class="btn" style="text-decoration: none; display: inline-block;">
                    <i class="fas fa-home"></i> Hjem
                </a>
                <a href="/victory-tech-tree" class="btn" style="text-decoration: none; display: inline-block;">
                    <i class="fas fa-trophy"></i> Victory Tech Tree
                </a>
                <button class="btn" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Opdater
                </button>
                <button class="btn" onclick="toggleInfoPanel()">
                    <i class="fas fa-info-circle"></i> Info
                </button>
            </div>
        </div>

        <div class="tech-tree-container" id="treeContainer">
            <div class="tech-tree" id="techTree">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div>Indlæser Dansk Giga Guddommelig Tech Træ...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <h2>Node Information</h2>
        <div id="nodeInfo">
            <p>Klik på en node for at se detaljer</p>
        </div>
    </div>

    <div class="stats-panel">
        <h3><i class="fas fa-chart-line"></i> Unified Stats</h3>
        <div id="statsContent">
            <div class="stat-item">
                <span class="stat-label">Indlæser...</span>
                <span class="stat-value">-</span>
            </div>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">
            <i class="fas fa-plus"></i>
        </button>
        <button class="zoom-btn" onclick="zoomOut()">
            <i class="fas fa-minus"></i>
        </button>
        <button class="zoom-btn" onclick="resetZoom()">
            <i class="fas fa-home"></i>
        </button>
    </div>

    <script>
        // Konfiguration
        const API_BASE = '/api/points';
        const USER_ID = 'default_user';
        const BASE_URL = '';
        let currentZoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let nodes = [];
        let connections = [];

        // Initialiser
        document.addEventListener('DOMContentLoaded', () => {
            createDanskParticles();
            loadUnifiedStats();
            setupPanAndZoom();
        });

        // Opret Dansk Flag Partikler
        function createDanskParticles() {
            const particlesContainer = document.getElementById('danskParticles');
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'dansk-particle';
                if (i % 3 === 0) {
                    particle.classList.add('white');
                }
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (12 + Math.random() * 12) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Indlæs Unified Stats
        async function loadUnifiedStats() {
            try {
                const response = await fetch(`${API_BASE}/all?user_id=${USER_ID}`).catch(e => ({ ok: false, json: () => ({ success: false, error: e.message }) }));
                const data = response.ok ? await response.json() : { success: false, points: {} };
                
                document.getElementById('loading').style.display = 'none';
                
                renderTechTree(data);
                updateStats(data);
            } catch (error) {
                console.error('Fejl ved indlæsning af data:', error);
                document.getElementById('loading').innerHTML = 
                    '<div style="color: #ff4444;">Fejl ved indlæsning. Bruger demo mode.</div>';
                renderDemoTree();
            }
        }

        // Render Tech Træ
        function renderTechTree(stats) {
            const tree = document.getElementById('techTree');
            tree.innerHTML = '';
            nodes = [];
            connections = [];

            // Center Node - Giga Guddommelig Hub
            const centerNode = createNode('divine-hub', 50, 50, '👑', 'Giga Guddommelig Hub', 'node-divine');
            tree.appendChild(centerNode);
            nodes.push({ id: 'divine-hub', element: centerNode, x: 50, y: 50 });

            // Core Points (Rød - Dansk Farve)
            const coreStats = [
                { key: 'xp_total', icon: '⭐', label: 'XP Total', value: stats.xp_total || 0 },
                { key: 'level', icon: '📊', label: 'Level', value: stats.level || 1 },
                { key: 'level_progress', icon: '📈', label: 'Level Progress', value: (stats.level_progress || 0) * 100 }
            ];
            createStatNodes(coreStats, 30, 30, 'node-core', '#C8102E');

            // Stats Points (Hvid - Dansk Farve)
            const statsPoints = [
                { key: 'stats_points_total', icon: '💪', label: 'Stats Points', value: stats.stats_points_total || 0 },
                { key: 'creativity_points', icon: '🎨', label: 'Kreativitet', value: stats.creativity_points || 0 },
                { key: 'efficiency_points', icon: '⚡', label: 'Effektivitet', value: stats.efficiency_points || 0 },
                { key: 'quality_points', icon: '✨', label: 'Kvalitet', value: stats.quality_points || 0 },
                { key: 'knowledge_points', icon: '🧠', label: 'Viden', value: stats.knowledge_points || 0 }
            ];
            createStatNodes(statsPoints, 20, 50, 'node-stats', '#FFFFFF');

            // Economic Points (Guld)
            const economicStats = [
                { key: 'coins', icon: '🪙', label: 'Mønter', value: stats.coins || 0 },
                { key: 'credits', icon: '💳', label: 'Kreditter', value: stats.credits || 0 },
                { key: 'tokens', icon: '🎫', label: 'Tokens', value: stats.tokens || 0 }
            ];
            createStatNodes(economicStats, 80, 30, 'node-economic', '#FFD700');

            // Achievement Points (Grøn)
            const achievementStats = [
                { key: 'achievement_points', icon: '🏆', label: 'Achievement Points', value: stats.achievement_points || 0 },
                { key: 'trophy_points', icon: '🏅', label: 'Trophy Points', value: stats.trophy_points || 0 },
                { key: 'milestone_points', icon: '🎯', label: 'Milestone Points', value: stats.milestone_points || 0 }
            ];
            createStatNodes(achievementStats, 70, 70, 'node-achievement', '#00FF88');

            // Battle Points (Rød)
            const battleStats = [
                { key: 'battle_points', icon: '⚔️', label: 'Battle Points', value: stats.battle_points || 0 },
                { key: 'battle_wins', icon: '👑', label: 'Sejre', value: stats.battle_wins || 0 },
                { key: 'battle_streak', icon: '🔥', label: 'Streak', value: stats.battle_streak || 0 }
            ];
            createStatNodes(battleStats, 30, 70, 'node-battle', '#FF4444');

            // Metal System Points (Lilla)
            const metalStats = [
                { key: 'territory_points', icon: '🗺️', label: 'Territory', value: stats.territory_points || 0 },
                { key: 'sex_metal_points', icon: '💎', label: 'Sex Metal', value: stats.sex_metal_points || 0 },
                { key: 'porno_rights_points', icon: '📜', label: 'Porno Rights', value: stats.porno_rights_points || 0 },
                { key: 'mtg_points', icon: '🎴', label: 'MTG', value: stats.mtg_points || 0 },
                { key: 'trophy_hunt_points', icon: '🎯', label: 'Trophy Hunt', value: stats.trophy_hunt_points || 0 }
            ];
            createStatNodes(metalStats, 15, 50, 'node-metal', '#9d4edd');

            // Social Points (Cyan)
            const socialStats = [
                { key: 'social_points_total', icon: '👥', label: 'Social Points', value: stats.social_points_total || 0 },
                { key: 'friends_count', icon: '🤝', label: 'Venner', value: stats.friends_count || 0 },
                { key: 'chat_points', icon: '💬', label: 'Chat Points', value: stats.chat_points || 0 }
            ];
            createStatNodes(socialStats, 85, 50, 'node-social', '#00d4ff');

            // Resource Points (Pink)
            const resourceStats = [
                { key: 'resource_energy', icon: '⚡', label: 'Energi', value: stats.resource_energy || 0 },
                { key: 'resource_materials', icon: '🔧', label: 'Materialer', value: stats.resource_materials || 0 },
                { key: 'resource_knowledge', icon: '📚', label: 'Viden', value: stats.resource_knowledge || 0 }
            ];
            createStatNodes(resourceStats, 50, 20, 'node-resource', '#ff64ff');

            // Activity Points (Orange)
            const activityStats = [
                { key: 'videos_created', icon: '🎬', label: 'Videoer Oprettet', value: stats.videos_created || 0 },
                { key: 'videos_watched', icon: '👁️', label: 'Videoer Set', value: stats.videos_watched || 0 },
                { key: 'login_streak', icon: '📅', label: 'Login Streak', value: stats.login_streak || 0 }
            ];
            createStatNodes(activityStats, 50, 80, 'node-activity', '#ffaa00');

            // Positioner alle nodes
            positionNodes();
        }

        // Opret Stat Nodes
        function createStatNodes(statArray, centerX, centerY, nodeClass, connectionColor) {
            const tree = document.getElementById('techTree');
            const angleStep = (2 * Math.PI) / statArray.length;
            const radius = 15;

            statArray.forEach((stat, index) => {
                const angle = index * angleStep;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                const node = createNode(
                    `stat-${stat.key}`,
                    x, y,
                    stat.icon,
                    stat.label,
                    nodeClass,
                    { key: stat.key, value: stat.value, label: stat.label }
                );
                
                // Tilføj værdi
                const valueSpan = document.createElement('span');
                valueSpan.className = 'node-value';
                valueSpan.textContent = formatValue(stat.value);
                node.appendChild(valueSpan);
                
                tree.appendChild(node);
                nodes.push({ id: `stat-${stat.key}`, element: node, x, y, data: stat });
                
                // Forbindelse til center
                createConnection(50, 50, x, y, connectionColor);
            });
        }

        // Opret Node Element
        function createNode(id, x, y, icon, label, className, data = null) {
            const node = document.createElement('div');
            node.className = `node ${className}`;
            node.id = id;
            node.dataset.x = x;
            node.dataset.y = y;
            
            node.innerHTML = `
                <div class="node-icon">${icon}</div>
                <div class="node-label">${label}</div>
            `;
            
            node.style.left = x + '%';
            node.style.top = y + '%';
            
            if (data) {
                node.addEventListener('click', () => showNodeInfo(data, label));
            }
            
            return node;
        }

        // Opret Forbindelseslinje
        function createConnection(x1, y1, x2, y2, color) {
            const connection = document.createElement('div');
            connection.className = 'connection';
            connection.style.color = color;
            
            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.sqrt(dx * dx + dy * dy) * 1.5;
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            
            connection.style.width = length + '%';
            connection.style.left = x1 + '%';
            connection.style.top = y1 + '%';
            connection.style.transform = `rotate(${angle}deg)`;
            connection.style.transformOrigin = '0 50%';
            
            document.getElementById('techTree').appendChild(connection);
            connections.push(connection);
        }

        // Positioner Nodes
        function positionNodes() {
            const tree = document.getElementById('techTree');
            const treeRect = tree.getBoundingClientRect();
            
            nodes.forEach(node => {
                const x = (node.x / 100) * treeRect.width;
                const y = (node.y / 100) * treeRect.height;
                node.element.style.left = x + 'px';
                node.element.style.top = y + 'px';
            });
        }

        // Format Værdi
        function formatValue(value) {
            if (typeof value === 'number') {
                if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
                return value.toString();
            }
            return value;
        }

        // Vis Node Info
        function showNodeInfo(data, title) {
            const infoPanel = document.getElementById('infoPanel');
            const nodeInfo = document.getElementById('nodeInfo');
            
            infoPanel.classList.add('open');
            
            let html = `<h2>${title}</h2>`;
            html += `<div class="info-section">
                <h3>Statistik</h3>
                <div class="info-item"><strong>Nøgle:</strong> ${data.key}</div>
                <div class="info-item"><strong>Værdi:</strong> ${formatValue(data.value)}</div>
                <div class="info-item"><strong>Type:</strong> Unified Stat</div>
            </div>`;
            
            nodeInfo.innerHTML = html;
        }

        // Opdater Stats Panel
        function updateStats(stats) {
            const statsContent = document.getElementById('statsContent');
            
            const totalPoints = (stats.xp_total || 0) + (stats.stats_points_total || 0) + 
                              (stats.achievement_points || 0) + (stats.battle_points || 0);
            
            statsContent.innerHTML = `
                <div class="stat-item">
                    <span class="stat-label">Total XP</span>
                    <span class="stat-value">${formatValue(stats.xp_total || 0)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Level</span>
                    <span class="stat-value">${stats.level || 1}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Stats Points</span>
                    <span class="stat-value">${formatValue(stats.stats_points_total || 0)}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Points</span>
                    <span class="stat-value">${formatValue(totalPoints)}</span>
                </div>
            `;
        }

        // Toggle Info Panel
        function toggleInfoPanel() {
            document.getElementById('infoPanel').classList.toggle('open');
        }

        // Opdater Data
        function refreshData() {
            document.getElementById('loading').style.display = 'block';
            loadUnifiedStats();
        }

        // Zoom Kontroller
        function zoomIn() {
            currentZoom = Math.min(currentZoom * 1.2, 3);
            applyTransform();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom / 1.2, 0.5);
            applyTransform();
        }

        function resetZoom() {
            currentZoom = 1;
            panX = 0;
            panY = 0;
            applyTransform();
        }

        function applyTransform() {
            const tree = document.getElementById('techTree');
            tree.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
        }

        // Pan og Zoom Setup
        function setupPanAndZoom() {
            const container = document.getElementById('treeContainer');
            const tree = document.getElementById('techTree');
            
            container.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    isDragging = true;
                    dragStart.x = e.clientX - panX;
                    dragStart.y = e.clientY - panY;
                }
            });
            
            container.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    panX = e.clientX - dragStart.x;
                    panY = e.clientY - dragStart.y;
                    applyTransform();
                }
            });
            
            container.addEventListener('mouseup', () => {
                isDragging = false;
            });
            
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                currentZoom = Math.max(0.5, Math.min(3, currentZoom * delta));
                applyTransform();
            });
        }

        // Demo Træ
        function renderDemoTree() {
            renderTechTree({
                xp_total: 0,
                level: 1,
                stats_points_total: 0
            });
        }
    </script>

            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            if (storedVersion && storedVersion !== currentVersion && storedVersion !== '0') {

                if (window.location.search.indexOf('v=') === -1) { window.location.reload(); return; }
            }
            if (!storedVersion) sessionStorage.setItem('pageCacheVersion', currentVersion);
