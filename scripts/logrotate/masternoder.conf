/var/www/html/uwsgi.log /var/www/html/uwsgi_5001.log {
    daily
    size 10M
    rotate 3
    maxage 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    prerotate
        rm -f /var/www/html/uwsgi.log.[0-9]* /var/www/html/uwsgi_5001.log.[0-9]* 2>/dev/null || true
    endscript
}

/var/log/mongodb/mongod.log {
    weekly
    size 50M
    rotate 2
    maxage 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
