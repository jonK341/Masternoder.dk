[uwsgi]
# Second instance for load spreading: only binds 5001 (do NOT reuse uwsgi.ini — it would also bind 5000 and fail).
ini = /var/www/html/uwsgi_common.ini
http-socket = 127.0.0.1:5001
# REQUIRED: separate pidfile from the :5000 instance (both use chdir=/var/www/html; default uwsgi.pid would collide → exit 1)
pidfile = /var/www/html/uwsgi_5001.pid
logto = /var/www/html/uwsgi_5001.log
touch-reload = /var/www/html/.uwsgi_touch_reload_5001
