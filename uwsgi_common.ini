[uwsgi]
# Shared settings for all uWSGI instances (see uwsgi.ini and uwsgi_5001.ini)
# Application: project root has wsgi.py (create_app from src.app)
module = wsgi
callable = application

# Queue size: during startup (lazy-apps=false) or heavy load, 100 is too small; 502/110 if queue full
listen = 400

# Project root (chdir so src/, backend/, vidgenerator/src/, run.py, wsgi.py are found)
chdir = /var/www/html
pythonpath = /var/www/html
# pidfile: set per instance in uwsgi.ini and uwsgi_5001.ini (shared default uwsgi.pid would break a second master)

# Process configuration: eager load so first request responds immediately (90% uptime plan)
# 4 processes x 2 threads = 8 workers; add swap first to avoid OOM (see scripts/server_add_swap.py)
master = true
processes = 4
threads = 2
enable-threads = true
lazy-apps = false

log-master = true
log-maxsize = 50000000
log-backupcount = 5

# Timeouts (avoid 504; 300s so first request / heavy load does not kill workers)
harakiri = 300
harakiri-verbose = true
socket-timeout = 120

# Python (use system Python; venv optional)
plugins = python3
# virtualenv = /var/www/html/.venv

# Security (must be www-data for nginx; ensure no CRLF in this file)
uid = www-data
gid = www-data

# Buffer size for POST requests
buffer-size = 65536
post-buffering = 65536

die-on-term = true
vacuum = true
