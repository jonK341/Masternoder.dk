    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --accent: #ff6b9d;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.95);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-glow: rgba(0, 255, 136, 0.5);
            --money: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 2px solid var(--border-glow);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--money), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .recap-section {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--border-glow);
            margin-bottom: 40px;
        }

        .recap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .recap-card {
            background: rgba(0, 255, 136, 0.1);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--money);
        }

        .recap-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--money);
            margin-bottom: 5px;
        }

        .recap-label {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stream-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--border-glow);
            transition: all 0.3s;
        }

        .stream-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-color: var(--money);
        }

        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stream-priority {
            background: var(--money);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .stream-name {
            font-size: 1.3em;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .stream-price {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--money);
            margin: 15px 0;
        }

        .stream-category {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stream-description {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .stream-features {
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
        }

        .stream-features li {
            padding: 5px 0;
            color: var(--text-secondary);
        }

        .stream-features li:before {
            content: "✓ ";
            color: var(--primary);
            font-weight: bold;
        }

        .stream-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .stream-status.enabled {
            background: var(--primary);
            color: #000;
        }

        .stream-status.disabled {
            background: #666;
            color: #fff;
        }

        .enable-button {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--money), var(--primary));
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .enable-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5);
        }
    </style>

<body>
    <div class="header">
        <h1>💰 Monetization & Income Streams</h1>
        <p>Top 25 Income Streams - Revenue Generation</p>
    </div>

    <div class="recap-section">
        <h2 style="margin-bottom: 20px; color: var(--primary);">📊 Monetization Recap</h2>
        <div class="recap-grid" id="recap-grid">
            <div class="recap-card">
                <div class="recap-value" id="total-revenue">$0</div>
                <div class="recap-label">Total Revenue</div>
            </div>
            <div class="recap-card">
                <div class="recap-value" id="total-streams">0</div>
                <div class="recap-label">Total Streams</div>
            </div>
            <div class="recap-card">
                <div class="recap-value" id="enabled-streams">0</div>
                <div class="recap-label">Enabled Streams</div>
            </div>
            <div class="recap-card">
                <div class="recap-value" id="monthly-potential">$0</div>
                <div class="recap-label">Monthly Potential</div>
            </div>
        </div>
    </div>

    <div>
        <h2 style="margin-bottom: 20px; color: var(--primary);">💎 Top 25 Income Streams</h2>
        <div class="streams-grid" id="streams-grid">
            <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                Loading income streams...
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        // Load monetization recap
        async function loadRecap() {
            try {
                const response = await fetch(`${BASE_URL}/api/monetization/recap`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.revenue_stats;
                    const potential = data.potential_monthly_revenue;
                    
                    document.getElementById('total-revenue').textContent = 
                        '$' + new Intl.NumberFormat().format(stats.total_revenue || 0);
                    document.getElementById('total-streams').textContent = data.total_streams || 0;
                    document.getElementById('enabled-streams').textContent = data.enabled_streams || 0;
                    document.getElementById('monthly-potential').textContent = 
                        '$' + new Intl.NumberFormat().format(potential.monthly_recurring_potential || 0);
                }
            } catch (error) {
                console.error('Error loading recap:', error);
            }
        }

        // Load top 25 streams
        async function loadTop25() {
            try {
                const response = await fetch(`${BASE_URL}/api/monetization/top-25`);
                const data = await response.json();
                
                if (data.success && data.top_25_streams) {
                    renderStreams(data.top_25_streams);
                }
            } catch (error) {
                console.error('Error loading streams:', error);
            }
        }

        function renderStreams(streams) {
            const grid = document.getElementById('streams-grid');
            grid.innerHTML = '';
            
            streams.forEach(stream => {
                const card = document.createElement('div');
                card.className = 'stream-card';
                
                const isEnabled = stream.enabled !== false;
                const recurring = stream.recurring ? `/${stream.interval || 'month'}` : '';
                
                card.innerHTML = `
                    <div class="stream-header">
                        <span class="stream-priority">#${stream.priority}</span>
                        <span class="stream-status ${isEnabled ? 'enabled' : 'disabled'}">
                            ${isEnabled ? 'ENABLED' : 'DISABLED'}
                        </span>
                    </div>
                    <div class="stream-name">${stream.name}</div>
                    <div class="stream-category">${stream.category.replace('_', ' ').toUpperCase()}</div>
                    <div class="stream-price">$${stream.price}${recurring}</div>
                    <p class="stream-description">${stream.description}</p>
                    ${stream.features ? `
                        <ul class="stream-features">
                            ${stream.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                    ` : ''}
                    <button class="enable-button" onclick="toggleStream('${stream.id}', ${!isEnabled})">
                        ${isEnabled ? 'Disable' : 'Enable'} Stream
                    </button>
                `;
                
                grid.appendChild(card);
            });
        }

        async function toggleStream(streamId, enable) {
            try {
                const endpoint = enable ? 'enable' : 'disable';
                const response = await fetch(`${BASE_URL}/api/monetization/${endpoint}/${streamId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                if (data.success) {
                    alert(`Stream ${enable ? 'enabled' : 'disabled'} successfully!`);
                    loadTop25();
                    loadRecap();
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error toggling stream: ' + error);
            }
        }

        // Initialize
        loadRecap();
        loadTop25();
        setInterval(() => {
            loadRecap();
            loadTop25();
        }, 60000); // Refresh every minute
    </script>

    <script>
        // Force reload main content on page load if cache version is old
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || '0';
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            
            if (storedVersion && storedVersion !== currentVersion) {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                if (window.location.search.indexOf('v=') === -1) {
                    window.location.reload();
                    return;
                }
            } else if (!storedVersion) {
                // First visit - store version
                sessionStorage.setItem('pageCacheVersion', currentVersion);
            }
            
            // Add cache-busting to all internal links
            document.addEventListener('DOMContentLoaded', function() {
                const links = document.querySelectorAll('a[href^="/"]');
                links.forEach(link => {
                    if (!link.href.includes('?')) {
                        link.href += '?v=' + currentVersion;
                    }
                });
            });
        })();
    </script>

    <script>
        // Simple cache version check (no aggressive reloading)
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || document.querySelector('meta[name="version"]')?.content || '0';
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            
            // Only reload if version actually changed (not on every load)
            if (storedVersion && storedVersion !== currentVersion && storedVersion !== '0') {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                // Only reload once if version changed
                if (window.location.search.indexOf('v=') === -1) {
                    window.location.reload();
                    return;
                }
            }
            
            // Store version only once
            if (!storedVersion) {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
            }
        })();
    </script>
