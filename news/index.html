<!DOCTYPE html>
<html lang="en" data-agent-skill-sets="enriched">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>News - MasterNoder</title>
    <link rel="stylesheet" href="/static/css/modern-design-system.css?v=20260304154115">
    <link rel="stylesheet" href="/static/css/navigation-toolbar.css?v=20260304154115">
    <link rel="stylesheet" href="/static/css/ptc-ad-rotator.css?v=20260429a">
    <style>
        .news-page { padding: 100px 20px 40px; max-width: 900px; margin: 0 auto; }
        .news-header { text-align: center; margin-bottom: 2rem; }
        .news-card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid rgba(0,255,136,0.2); }
        .news-card h3 { margin: 0 0 0.5rem; color: #00ff88; }
        .news-card h3 a { color: inherit; text-decoration: none; }
        .news-card h3 a:hover { text-decoration: underline; }
        .news-card .date { font-size: 0.85em; opacity: 0.8; }
        .news-card .channel { display: inline-block; font-size: 0.72em; margin-left: 8px; padding: 2px 8px; border-radius: 999px; background: rgba(0,212,255,0.15); color: #00d4ff; }
        .news-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1.5rem; }
        .news-links a { color: #00ff88; text-decoration: none; padding: 8px 14px; border: 1px solid rgba(0,255,136,0.4); border-radius: 8px; }
        .news-links a:hover { background: rgba(0,255,136,0.15); }
        .news-filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 1.25rem; }
        .news-filters button { background: rgba(255,255,255,0.06); border: 1px solid rgba(0,255,136,0.35); color: #e8eefc; padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 0.82rem; }
        .news-filters button.active { background: rgba(0,255,136,0.18); color: #00ff88; border-color: rgba(0,255,136,0.5); }
        .news-status { text-align: center; opacity: 0.7; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
    <link rel="stylesheet" href="/static/css/agent-skill-sets.css">
</head>
<body>
    <div class="news-page">
        <div class="news-header">
            <h1>📰 News</h1>
            <p>Platform updates from <code>GET /api/news/platform</code>. Filter by channel or browse all.</p>
        </div>
        <div class="news-filters" id="news-filters">
            <button type="button" class="active" data-channel="">All</button>
        </div>
        <div class="news-status" id="news-status">Loading…</div>
        <div id="news-feed"></div>
        <div data-ptc-placement="news_inline" data-ptc-limit="1"></div>
        <div class="news-links">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/profile">Profile</a>
            <a href="/quests">Quests</a>
            <a href="/aggregator">Aggregator</a>
        </div>
    </div>
    <script src="/static/js/navigation-toolbar.js"></script>
    <script src="/static/js/ptc-ad-rotator.js?v=20260429a"></script>
    <script src="/static/js/platform-news.js?v=20260616a" defer></script>
    <script src="/static/js/agent-skill-sets.js" defer></script>
    <script src="/static/js/hypnotic-point-counters.js"></script>
</body>
</html>
