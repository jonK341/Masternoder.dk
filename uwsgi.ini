[uwsgi]
# Primary instance: nginx proxies to 127.0.0.1:5000
ini = /var/www/html/uwsgi_common.ini
http-socket = 127.0.0.1:5000
# Explicit pidfile so second instance (uwsgi_5001.ini) never fights default uwsgi.pid in same chdir
pidfile = /var/www/html/uwsgi.pid

# Logging at project root (no vidgenerator subfolder)
logto = /var/www/html/uwsgi.log

# Graceful worker reload (no systemctl restart): after uploading Python/static files, run:
#   touch /var/www/html/.uwsgi_touch_reload
# See scripts/deploy_starmap25_upload_touch_reload.py
touch-reload = /var/www/html/.uwsgi_touch_reload
