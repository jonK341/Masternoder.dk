<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="cache-version" content="20260123">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point System Control Board - 178 Systems</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --accent: #ff6b9d;
            --bg-dark: #1a1a2e;
            --bg-darker: #0f0f1e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(40, 40, 55, 0.8);
            --border-color: rgba(0, 255, 136, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .control-board-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 2px solid var(--border-color);
            backdrop-filter: blur(20px);
        }

        .control-board-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-board-header .subtitle {
            color: var(--text-secondary);
            font-size: 1.2em;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .summary-stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .summary-stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .summary-stat-label {
            color: var(--text-secondary);
            font-size: 1em;
        }

        .category-section {
            margin-bottom: 40px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .category-header h2 {
            font-size: 1.8em;
            color: var(--primary);
        }

        .category-count {
            background: var(--primary);
            color: var(--bg-dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .systems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .system-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .system-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--system-color, var(--primary));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .system-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
            border-color: var(--system-color, var(--primary));
        }

        .system-card:hover::before {
            transform: scaleX(1);
        }

        .system-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .system-icon {
            font-size: 2.5em;
        }

        .system-info h3 {
            font-size: 1.3em;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .system-info .system-category {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .system-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .system-points {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--system-color, var(--primary));
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--status-color, #00ff88);
        }

        .status-dot.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-dot.inactive {
            background: #666;
        }

        .dashboard-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid var(--primary);
            border-radius: 6px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .dashboard-link:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            padding: 20px;
            border-radius: 12px;
            color: #ff4444;
            margin: 20px 0;
        }

        .expandable-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .expandable-section.expanded {
            max-height: 2000px;
        }

        .expand-toggle {
            cursor: pointer;
            user-select: none;
        }

        @media (max-width: 768px) {
            .systems-grid {
                grid-template-columns: 1fr;
            }

            .summary-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>

<body>
    <div class="control-board-header">
        <h1>🎮 Point System Control Board</h1>
        <p class="subtitle">Comprehensive Dashboard for All Point Systems</p>
        <p class="subtitle" style="font-size: 0.9em; margin-top: 10px;">
            Current: <span id="current-systems-count">30</span> Systems | 
            Target: <span style="color: var(--primary);">178 Systems</span>
        </p>
    </div>

    <div class="summary-stats" id="summary-stats">
        <div class="summary-stat-card">
            <div class="summary-stat-value" id="total-points">0</div>
            <div class="summary-stat-label">Total Points</div>
        </div>
        <div class="summary-stat-card">
            <div class="summary-stat-value" id="active-systems">0</div>
            <div class="summary-stat-label">Active Systems</div>
        </div>
        <div class="summary-stat-card">
            <div class="summary-stat-value" id="total-systems">30</div>
            <div class="summary-stat-label">Total Systems</div>
        </div>
        <div class="summary-stat-card">
            <div class="summary-stat-value" id="categories-count">12</div>
            <div class="summary-stat-label">Categories</div>
        </div>
        <div class="summary-stat-card">
            <div class="summary-stat-value" id="stat-trophies">0</div>
            <div class="summary-stat-label">Trophy Points</div>
        </div>
    </div>

    <div id="categories-container">
        <div class="loading">Loading point systems...</div>
    </div>

    <script>
        const BASE_URL = window.location.origin;
        let overviewData = null;

        // Load control board overview
        async function loadControlBoard() {
            try {
                const response = await fetch(`${BASE_URL}/api/points/control-board/overview`);
                const data = await response.json();
                
                if (data.success && data.overview) {
                    overviewData = data.overview;
                    renderControlBoard(data.overview);
                } else {
                    showError('Failed to load control board data');
                }
            } catch (error) {
                console.error('Error loading control board:', error);
                showError('Error loading control board: ' + error.message);
            }
        }

        function renderControlBoard(overview) {
            // Update summary stats
            document.getElementById('total-points').textContent = 
                formatNumber(overview.summary.total_points);
            document.getElementById('active-systems').textContent = 
                overview.summary.active_systems;
            document.getElementById('total-systems').textContent = 
                overview.total_systems;
            document.getElementById('current-systems-count').textContent = 
                overview.total_systems;
            document.getElementById('categories-count').textContent = 
                Object.keys(overview.categories).length;

            // Render categories
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            for (const [category, systems] of Object.entries(overview.categories)) {
                const categorySection = createCategorySection(category, systems);
                container.appendChild(categorySection);
            }
        }

        function createCategorySection(category, systems) {
            const section = document.createElement('div');
            section.className = 'category-section';

            const header = document.createElement('div');
            header.className = 'category-header expand-toggle';
            header.onclick = () => toggleCategory(section);

            header.innerHTML = `
                <h2>${category}</h2>
                <span class="category-count">${systems.length} Systems</span>
            `;

            const grid = document.createElement('div');
            grid.className = 'systems-grid';

            systems.forEach(system => {
                const card = createSystemCard(system);
                grid.appendChild(card);
            });

            section.appendChild(header);
            section.appendChild(grid);

            return section;
        }

        function createSystemCard(system) {
            const card = document.createElement('div');
            card.className = 'system-card';
            card.style.setProperty('--system-color', system.color);
            card.onclick = () => openSystemDashboard(system.system_id);

            const points = system.points || 0;
            const isActive = points > 0;

            card.innerHTML = `
                <div class="system-card-header">
                    <div class="system-icon">${system.icon}</div>
                    <div class="system-info">
                        <h3>${system.name}</h3>
                        <div class="system-category">${system.category}</div>
                    </div>
                </div>
                <div class="system-stats">
                    <div class="system-points" style="color: ${system.color}">
                        ${formatNumber(points)}
                    </div>
                    <div class="system-status">
                        <div class="status-dot ${isActive ? 'active' : 'inactive'}"></div>
                        <span>${isActive ? 'Active' : 'Inactive'}</span>
                    </div>
                </div>
                <a href="${system.dashboard_url}" class="dashboard-link" onclick="event.stopPropagation()">
                    View Dashboard →
                </a>
            `;

            return card;
        }

        function toggleCategory(section) {
            const grid = section.querySelector('.systems-grid');
            grid.classList.toggle('expanded');
        }

        function openSystemDashboard(systemId) {
            window.location.href = `/dashboard/points/${systemId}`;
        }

        function formatNumber(num) {
            return new Intl.NumberFormat().format(num);
        }

        function showError(message) {
            const container = document.getElementById('categories-container');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        // Auto-refresh every 30 seconds
        loadControlBoard();
        setInterval(loadControlBoard, 30000);
    </script>

    <script>
        // Force reload main content on page load if cache version is old
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || '0';
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            
            if (storedVersion && storedVersion !== currentVersion) {
                // Cache version changed - force reload
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                window.location.reload(true);
            } else if (!storedVersion) {
                // First visit - store version
                sessionStorage.setItem('pageCacheVersion', currentVersion);
            }
            
            // Add cache-busting to all internal links
            document.addEventListener('DOMContentLoaded', function() {
                const links = document.querySelectorAll('a[href^="/"]');
                links.forEach(link => {
                    if (!link.href.includes('?')) {
                        link.href += '?v=' + currentVersion;
                    }
                });
            });
        })();
    </script>

    <script>
        // AGGRESSIVE CACHE-BUSTING FOR MAIN CONTENT
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || Date.now().toString();
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            const contentVersion = sessionStorage.getItem('contentCacheVersion');
            
            // Force reload if version changed
            if (storedVersion && storedVersion !== currentVersion) {
                sessionStorage.clear();
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                sessionStorage.setItem('contentCacheVersion', currentVersion);
                window.location.href = window.location.href.split('?')[0] + '?v=' + currentVersion + '&_=' + Date.now();
                return;
            }
            
            // Store versions
            sessionStorage.setItem('pageCacheVersion', currentVersion);
            if (!contentVersion || contentVersion !== currentVersion) {
                sessionStorage.setItem('contentCacheVersion', currentVersion);
            }
            
            // Force reload main content area on every load
            function forceReloadContent() {
                const mainContent = document.querySelector('.container') || document.querySelector('main') || document.querySelector('#main') || document.body;
                if (mainContent) {
                    // Add timestamp to force re-render
                    mainContent.setAttribute('data-version', currentVersion);
                    mainContent.setAttribute('data-timestamp', Date.now());
                    
                    // Force style recalculation
                    const display = window.getComputedStyle(mainContent).display;
                    mainContent.style.display = 'none';
                    mainContent.offsetHeight; // Trigger reflow
                    mainContent.style.display = display;
                    
                    // Add comment to force HTML change detection
                    const comment = document.createComment(' FORCED REFRESH ' + Date.now() + ' ');
                    mainContent.insertBefore(comment, mainContent.firstChild);
                }
            }
            
            // Run immediately and on DOM ready
            forceReloadContent();
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', forceReloadContent);
            } else {
                setTimeout(forceReloadContent, 100);
            }
            
            // Add cache-busting to all links and forms
            function addCacheBusting() {
                const links = document.querySelectorAll('a[href^="/"], a[href^="/"]');
                links.forEach(link => {
                    const url = new URL(link.href, window.location.origin);
                    if (!url.searchParams.has('v')) {
                        url.searchParams.set('v', currentVersion);
                        url.searchParams.set('_', Date.now());
                        link.href = url.toString();
                    }
                });
                
                // Add to forms
                const forms = document.querySelectorAll('form[action]');
                forms.forEach(form => {
                    const action = form.getAttribute('action');
                    if (action && !action.includes('v=')) {
                        const separator = action.includes('?') ? '&' : '?';
                        form.setAttribute('action', action + separator + 'v=' + currentVersion + '&_=' + Date.now());
                    }
                });
            }
            
            // Run on DOM ready and periodically
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', addCacheBusting);
            } else {
                addCacheBusting();
            }
            
            // Periodic check for content updates
            setInterval(function() {
                const stored = sessionStorage.getItem('contentCacheVersion');
                if (stored && stored !== currentVersion) {
                    window.location.reload(true);
                }
            }, 5000);
            
            // Intercept fetch/XHR to add cache-busting
            const originalFetch = window.fetch;
            window.fetch = function(...args) {
                if (typeof args[0] === 'string' && args[0].startsWith('/')) {
                    const url = new URL(args[0], window.location.origin);
                    url.searchParams.set('_', Date.now());
                    args[0] = url.toString();
                }
                return originalFetch.apply(this, args);
            };
        })();
    </script>
