<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents Control — MasterNoder</title>
    <link rel="stylesheet" href="/static/css/modern-design-system.css">
    <link rel="stylesheet" href="/static/css/navigation-toolbar.css">
    <style>
        body { background: #0a0a12; color: #eee; min-height: 100vh; padding: 90px 20px; max-width: 900px; margin: 0 auto; }
        button { margin: 6px; padding: 10px 16px; border-radius: 8px; border: 1px solid #a0f; background: rgba(170,0,255,0.15); color: #c8f; cursor: pointer; }
        pre { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; overflow: auto; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Agents Control Board</h1>
    <p>Treasury pool, trader wallets, kill switch.</p>
    <div>
        <button type="button" id="btn-fund">Fund agents</button>
        <button type="button" id="btn-trader">Run traders</button>
        <button type="button" id="btn-halt">Global halt</button>
        <button type="button" id="btn-resume">Resume</button>
        <button type="button" id="btn-refresh">Refresh status</button>
    </div>
    <pre id="out">Loading…</pre>
    <script src="/static/js/navigation-toolbar.js"></script>
    <script>
    const secret = new URLSearchParams(location.search).get('ops_secret') || '';
    const hdr = {'Content-Type': 'application/json', ...(secret ? {'X-Ops-Secret': secret} : {})};
    async function load() {
        const r = await fetch('/api/agents/control/status', {headers: hdr});
        document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
    }
    document.getElementById('btn-refresh').onclick = load;
    document.getElementById('btn-fund').onclick = () => fetch('/api/agents/control/fund', {method:'POST', headers: hdr}).then(load);
    document.getElementById('btn-trader').onclick = () => fetch('/api/agents/control/trader/run', {method:'POST', headers: hdr}).then(load);
    document.getElementById('btn-halt').onclick = () => fetch('/api/agents/control/halt', {method:'POST', headers: hdr, body:'{}'}).then(load);
    document.getElementById('btn-resume').onclick = () => fetch('/api/agents/control/resume', {method:'POST', headers: hdr, body:'{}'}).then(load);
    load();
    </script>
</body>
</html>
