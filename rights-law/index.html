<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="cache-version" content="20260123">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rights & Law - Masternoder.dk</title>
    <link rel="stylesheet" href="/static/css/modern-design-system.css">
    <link rel="stylesheet" href="/static/css/navigation-toolbar.css">
    <style>
        .rights-law-page {
            min-height: 100vh;
            position: relative;
            z-index: 2;
            padding-top: 40px;
            padding-bottom: 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 212, 255, 0.1));
            border-radius: 20px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .page-header h1 {
            font-size: var(--font-size-4xl);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
        }

        .tabs-container {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-button {
            padding: var(--spacing-md) var(--spacing-lg);
            background: rgba(40, 40, 55, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab-button:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .tab-button.active {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 212, 255, 0.2));
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .paragraphs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .paragraph-card {
            background: linear-gradient(135deg, rgba(40, 40, 55, 0.95), rgba(30, 30, 45, 0.95));
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: var(--spacing-lg);
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
        }

        .paragraph-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .paragraph-title {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: var(--spacing-sm);
        }

        .paragraph-content {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
            line-height: 1.6;
        }

        .paragraph-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .points-badge {
            padding: var(--spacing-xs) var(--spacing-sm);
            background: rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            color: var(--primary);
            font-weight: 600;
        }

        .read-button {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .read-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .read-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .discussion-groups-section {
            margin-top: var(--spacing-xl);
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .group-card {
            background: linear-gradient(135deg, rgba(40, 40, 55, 0.95), rgba(30, 30, 45, 0.95));
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: var(--spacing-lg);
            transition: all 0.3s ease;
        }

        .group-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: var(--spacing-md);
        }

        .group-name {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--secondary);
        }

        .group-meta {
            display: flex;
            gap: var(--spacing-md);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        .discussion-item {
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }

        .discussion-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: var(--spacing-xs);
        }

        .discussion-meta {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: rgba(40, 40, 55, 0.6);
            border-radius: 15px;
            padding: var(--spacing-md);
            text-align: center;
        }

        .stat-value {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-top: var(--spacing-xs);
        }
    </style>
    <link rel="stylesheet" href="/static/css/image-support.css">
    <link rel="stylesheet" href="/static/css/template-effects.css">
    <link rel="stylesheet" href="/static/css/agent-skill-sets.css">
</head>
<body>
    <div class="bg-animated"></div>
    <div class="particles" id="particles"></div>
    
    <!-- Navigation -->
    <nav class="page-nav">
        <div class="nav-container">
            <a href="/" class="nav-link nav-home">🏠 Home</a>
            <div class="nav-links">
                <a href="/game" class="nav-link">Game</a>
            <a href="/points" class="nav-item" title="Points & Rewards">💎</a>
                <a href="/battle" class="nav-link">Battle</a>
                <a href="/social" class="nav-link">Social</a>
                <a href="/profile" class="nav-link">Profile</a>
                <a href="/rights-law" class="nav-link active">Rights & Law</a>
            </div>
        </div>
    </nav>
    
    <div class="container rights-law-page">
        <!-- Header -->
        <div class="page-header">
            <h1>⚖️ Rights & Law</h1>
            <p style="color: var(--text-secondary); font-size: var(--font-size-lg);">
                Understand your rights, earn points, and join discussions
            </p>
        </div>

        <!-- User Stats -->
        <div class="user-stats" id="user-stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-rights-points">0</div>
                <div class="stat-label">Rights Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-paragraphs-read">0</div>
                <div class="stat-label">Paragraphs Read</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-groups-joined">0</div>
                <div class="stat-label">Groups Joined</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-participation">0</div>
                <div class="stat-label">Participation Points</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-button active" onclick="showTab('paragraphs')">📜 Paragraphs</button>
            <button class="tab-button" onclick="showTab('groups')">👥 Discussion Groups</button>
            <button class="tab-button" onclick="showTab('my-groups')">⭐ My Groups</button>
        </div>

        <!-- Paragraphs Tab -->
        <div id="tab-paragraphs" class="tab-content active">
            <div id="paragraphs-container"></div>
        </div>

        <!-- Discussion Groups Tab -->
        <div id="tab-groups" class="tab-content">
            <div style="margin-bottom: var(--spacing-lg);">
                <button onclick="showCreateGroupModal()" style="
                    padding: var(--spacing-md) var(--spacing-lg);
                    background: var(--primary);
                    color: #000;
                    border: none;
                    border-radius: 10px;
                    cursor: pointer;
                    font-weight: 600;
                ">+ Create Discussion Group</button>
            </div>
            <div id="groups-container" class="groups-grid"></div>
        </div>

        <!-- My Groups Tab -->
        <div id="tab-my-groups" class="tab-content">
            <div id="my-groups-container" class="groups-grid"></div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="create-group-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: rgba(40, 40, 55, 0.95); padding: var(--spacing-xl); border-radius: 20px; max-width: 500px; width: 90%;">
            <h2 style="color: var(--primary); margin-bottom: var(--spacing-lg);">Create Discussion Group</h2>
            <input type="text" id="group-name-input" placeholder="Group Name" style="width: 100%; padding: var(--spacing-md); margin-bottom: var(--spacing-md); background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: var(--text-primary);">
            <textarea id="group-description-input" placeholder="Description" style="width: 100%; padding: var(--spacing-md); margin-bottom: var(--spacing-md); background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: var(--text-primary); min-height: 100px;"></textarea>
            <select id="group-category-input" style="width: 100%; padding: var(--spacing-md); margin-bottom: var(--spacing-md); background: rgba(0, 0, 0, 0.3); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: var(--text-primary);">
                <option value="general">General</option>
                <option value="privacy">Privacy</option>
                <option value="ip">Intellectual Property</option>
                <option value="rights">User Rights</option>
                <option value="content">Content Rights</option>
                <option value="platform">Platform Rights</option>
            </select>
            <div style="display: flex; gap: var(--spacing-md);">
                <button onclick="createGroup()" style="flex: 1; padding: var(--spacing-md); background: var(--primary); color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: 600;">Create</button>
                <button onclick="hideCreateGroupModal()" style="flex: 1; padding: var(--spacing-md); background: rgba(255, 255, 255, 0.1); color: var(--text-primary); border: none; border-radius: 10px; cursor: pointer; font-weight: 600;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.origin;
        const userId = localStorage.getItem('game_user_id') || 'default_user';

        let allParagraphs = null;
        let currentCategory = null;

        // Load all paragraphs
        async function loadAllParagraphs() {
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/paragraphs`);
                const data = await response.json();
                
                if (data.success) {
                    allParagraphs = data.paragraphs;
                    renderParagraphs();
                }
            } catch (error) {
                console.error('Error loading paragraphs:', error);
            }
        }

        // Render paragraphs
        function renderParagraphs() {
            const container = document.getElementById('paragraphs-container');
            if (!container || !allParagraphs) return;
            
            container.innerHTML = '';
            
            Object.keys(allParagraphs).forEach(category => {
                const categoryData = allParagraphs[category];
                const categoryDiv = document.createElement('div');
                categoryDiv.style.marginBottom = 'var(--spacing-xl)';
                
                categoryDiv.innerHTML = `
                    <h2 style="font-size: var(--font-size-2xl); color: var(--primary); margin-bottom: var(--spacing-lg);">
                        ${categoryData.title}
                    </h2>
                    <div class="paragraphs-grid" id="paragraphs-${category}"></div>
                `;
                
                container.appendChild(categoryDiv);
                
                const grid = document.getElementById(`paragraphs-${category}`);
                categoryData.paragraphs.forEach(para => {
                    const card = document.createElement('div');
                    card.className = 'paragraph-card';
                    card.innerHTML = `
                        <div class="paragraph-title">${para.title}</div>
                        <div class="paragraph-content">${para.content}</div>
                        <div class="paragraph-meta">
                            <div class="points-badge">${para.points_value} Points</div>
                            <button class="read-button" onclick="readParagraph('${para.id}')">Read & Earn Points</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        // Read paragraph
        async function readParagraph(paragraphId) {
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/paragraphs/${paragraphId}/read`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (typeof toast !== 'undefined') {
                        toast.success(`+${data.points_earned} Rights Points earned!`);
                    }
                    loadUserStats();
                } else {
                    if (typeof toast !== 'undefined') {
                        toast.error(data.error || 'Error reading paragraph');
                    }
                }
            } catch (error) {
                console.error('Error reading paragraph:', error);
            }
        }

        // Load discussion groups
        async function loadDiscussionGroups() {
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/groups`);
                const data = await response.json();
                
                if (data.success) {
                    renderGroups(data.groups);
                }
            } catch (error) {
                console.error('Error loading groups:', error);
            }
        }

        // Render groups
        function renderGroups(groups) {
            const container = document.getElementById('groups-container');
            if (!container) return;
            
            container.innerHTML = groups.map(group => `
                <div class="group-card">
                    <div class="group-header">
                        <div>
                            <div class="group-name">${group.group_name}</div>
                            <div style="color: var(--text-secondary); font-size: var(--font-size-sm); margin-top: var(--spacing-xs);">
                                ${group.description}
                            </div>
                        </div>
                    </div>
                    <div class="group-meta">
                        <span>👥 ${group.member_count} members</span>
                        <span>💬 ${group.discussion_count} discussions</span>
                    </div>
                    <button onclick="joinGroup('${group.group_id}')" style="
                        width: 100%;
                        margin-top: var(--spacing-md);
                        padding: var(--spacing-sm) var(--spacing-md);
                        background: var(--secondary);
                        color: #000;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                        font-weight: 600;
                    ">Join Group</button>
                </div>
            `).join('');
        }

        // Join group
        async function joinGroup(groupId) {
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/groups/${groupId}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (typeof toast !== 'undefined') {
                        toast.success('Joined group! +10 Social Points');
                    }
                    loadMyGroups();
                    loadUserStats();
                } else {
                    if (typeof toast !== 'undefined') {
                        toast.error(data.error || 'Error joining group');
                    }
                }
            } catch (error) {
                console.error('Error joining group:', error);
            }
        }

        // Load my groups
        async function loadMyGroups() {
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/user/${userId}/groups`);
                const data = await response.json();
                
                if (data.success) {
                    renderMyGroups(data.groups);
                }
            } catch (error) {
                console.error('Error loading my groups:', error);
            }
        }

        // Render my groups
        function renderMyGroups(groups) {
            const container = document.getElementById('my-groups-container');
            if (!container) return;
            
            if (groups.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); grid-column: 1 / -1;">No groups joined yet. Join a group to start discussing!</p>';
                return;
            }
            
            container.innerHTML = groups.map(group => `
                <div class="group-card">
                    <div class="group-header">
                        <div>
                            <div class="group-name">${group.group_name}</div>
                            <div style="color: var(--text-secondary); font-size: var(--font-size-sm); margin-top: var(--spacing-xs);">
                                ${group.description}
                            </div>
                        </div>
                    </div>
                    <div class="group-meta">
                        <span>👥 ${group.member_count} members</span>
                        <span>💬 ${group.discussion_count} discussions</span>
                    </div>
                    <button onclick="viewGroup('${group.group_id}')" style="
                        width: 100%;
                        margin-top: var(--spacing-md);
                        padding: var(--spacing-sm) var(--spacing-md);
                        background: var(--primary);
                        color: #000;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                        font-weight: 600;
                    ">View Discussions</button>
                </div>
            `).join('');
        }

        // View group
        function viewGroup(groupId) {
            // Load and display group discussions
            loadGroupDiscussions(groupId);
        }

        // Load group discussions
        async function loadGroupDiscussions(groupId) {
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/groups/${groupId}/discussions`);
                const data = await response.json();
                
                if (data.success) {
                    // Show discussions in a modal or new section
                    showGroupDiscussions(groupId, data.discussions);
                }
            } catch (error) {
                console.error('Error loading discussions:', error);
            }
        }

        // Show group discussions
        function showGroupDiscussions(groupId, discussions) {
            // Create modal or update section
            alert(`Group has ${discussions.length} discussions. Full discussion view coming soon!`);
        }

        // Create group
        async function createGroup() {
            const name = document.getElementById('group-name-input').value;
            const description = document.getElementById('group-description-input').value;
            const category = document.getElementById('group-category-input').value;
            
            if (!name || !description) {
                if (typeof toast !== 'undefined') {
                    toast.error('Name and description required');
                }
                return;
            }
            
            try {
                const response = await fetch(`${BASE_URL}/api/rights-law/groups/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        group_name: name,
                        description: description,
                        category: category,
                        is_public: true
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (typeof toast !== 'undefined') {
                        toast.success('Group created! +50 Social Points');
                    }
                    hideCreateGroupModal();
                    loadDiscussionGroups();
                    loadMyGroups();
                    loadUserStats();
                } else {
                    if (typeof toast !== 'undefined') {
                        toast.error(data.error || 'Error creating group');
                    }
                }
            } catch (error) {
                console.error('Error creating group:', error);
            }
        }

        // Show/hide create group modal
        function showCreateGroupModal() {
            document.getElementById('create-group-modal').style.display = 'flex';
        }

        function hideCreateGroupModal() {
            document.getElementById('create-group-modal').style.display = 'none';
            document.getElementById('group-name-input').value = '';
            document.getElementById('group-description-input').value = '';
        }

        // Load user stats
        async function loadUserStats() {
            try {
                const [rightsRes, participationRes] = await Promise.all([
                    fetch(`${BASE_URL}/api/rights-law/user/${userId}/rights`),
                    fetch(`${BASE_URL}/api/rights-law/user/${userId}/participation`)
                ]);
                
                const rightsData = await rightsRes.json();
                const participationData = await participationRes.json();
                
                if (rightsData.success) {
                    document.getElementById('stat-rights-points').textContent = rightsData.total_rights_points || 0;
                    document.getElementById('stat-paragraphs-read').textContent = rightsData.total_paragraphs_read || 0;
                }
                
                if (participationData.success) {
                    document.getElementById('stat-groups-joined').textContent = participationData.total_groups || 0;
                    document.getElementById('stat-participation').textContent = participationData.participation_points || 0;
                }
            } catch (error) {
                console.error('Error loading user stats:', error);
            }
        }

        // Show tab
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'groups') {
                loadDiscussionGroups();
            } else if (tabName === 'my-groups') {
                loadMyGroups();
            }
        }

        // Initialize particles
        function initParticles() {
            const particlesEl = document.getElementById('particles');
            if (!particlesEl) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: absolute;
                    width: 2px;
                    height: 2px;
                    background: var(--primary);
                    border-radius: 50%;
                    opacity: 0.5;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: float ${5 + Math.random() * 10}s infinite ease-in-out;
                    animation-delay: ${Math.random() * 5}s;
                `;
                particlesEl.appendChild(particle);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            loadAllParagraphs();
            loadUserStats();
        });
    </script>

    <script>
        // Simple cache version check (no aggressive reloading)
        (function() {
            const currentVersion = document.querySelector('meta[name="cache-version"]')?.content || document.querySelector('meta[name="version"]')?.content || '0';
            const storedVersion = sessionStorage.getItem('pageCacheVersion');
            if (storedVersion && storedVersion !== currentVersion && storedVersion !== '0') {
                sessionStorage.setItem('pageCacheVersion', currentVersion);
                if (window.location.search.indexOf('v=') === -1) { window.location.reload(); return; }
            }
            if (!storedVersion) sessionStorage.setItem('pageCacheVersion', currentVersion);
        })();
